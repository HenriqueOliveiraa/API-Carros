name: Spring Boot CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permite execução manual

jobs:
  # Job 1: Build e Test
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código
      - name: Checkout código
        uses: actions/checkout@v4

      # Configurar JDK
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Build com Maven
      - name: Build com Maven
        run: mvn clean install -DskipTests

      # Executar testes
      - name: Executar testes
        run: mvn test

      # Gerar relatório de cobertura
      - name: Cobertura de código
        run: mvn jacoco:report
        continue-on-error: true  # Continua mesmo se não tiver JaCoCo configurado

      # Upload do artifact (JAR)
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar

      # Análise de código com SonarCloud (opcional)
      - name: SonarCloud Scan
        if: github.event_name == 'push' && vars.SONAR_TOKEN != ''
        continue-on-error: true  # Não falha se não tiver SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar

  # Job 2: Build Docker Image
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.DOCKER_USERNAME != ''

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app
          path: target/

      # Login no Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build e Push da imagem
      - name: Build e Push Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/spring-app:latest
            ${{ secrets.DOCKER_USERNAME }}/spring-app:${{ github.sha }}

  # Job 3: Deploy (AWS, Heroku, ou servidor)
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.SERVER_HOST != ''

    steps:
      - name: Deploy para produção
        run: |
          echo "Iniciando deploy..."
          # Adicione aqui seus comandos de deploy
          # Exemplos abaixo:

      # OPÇÃO A: Deploy via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app
            docker-compose pull
            docker-compose up -d

    # OPÇÃO B: Deploy para AWS Elastic Beanstalk
