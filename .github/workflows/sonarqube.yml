name: SonarCloud

on:
  push:
    branches:
      - main

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=HenriqueOliveiraa_API-Carros
            -Dsonar.organization=henriqueoliveiraa
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}